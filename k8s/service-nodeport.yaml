# Use this service when the GitHub runner is on a VM peered with GDC but NOT inside the cluster.
# It exposes Ollama on a NodePort accessible from any GDC node IP.
# Apply INSTEAD of service.yaml (not alongside it).
#
# Usage:
#   kubectl apply -f k8s/service-nodeport.yaml
#
# Then set OLLAMA_HOST in rca_trigger.yml:
#   OLLAMA_HOST: "http://<GDC_NODE_IP>:30434"

apiVersion: v1
kind: Service
metadata:
  name: ollama-rca
  namespace: ollama-rca
  labels:
    app: ollama-rca
spec:
  type: NodePort
  selector:
    app: ollama-rca
  ports:
    - port: 11434
      name: http
      targetPort: 11434
      nodePort: 30434      # Accessible on all GDC node IPs at port 30434
      protocol: TCP
