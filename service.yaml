apiVersion: v1
kind: Service
metadata:
  name: ollama-rca
  namespace: ollama-rca
  labels:
    app: ollama-rca
spec:
  type: ClusterIP       # Internal only — no external exposure (air-gapped)
  selector:
    app: ollama-rca
  ports:
    - port: 11434
      name: http
      targetPort: 11434
      protocol: TCP
